spring.application.name=springboot-production-showcase

# h2 database connection
spring.datasource.url=jdbc:h2:mem:app_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

info.app.name=Spring Boot Production Showcase
info.app.description=Showcase project for REST APIs, DSA, Observer pattern, and production practices
info.app.version=1.0.0
